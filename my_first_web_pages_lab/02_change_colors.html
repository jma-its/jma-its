<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>My First Web Design - Change Colors</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  
<!--
TEACHER NOTE:

  <style>
    /* STUDENT EDIT AREA START */
    /*
      Task 1: Change the background color.
      Try: lightblue, lightgreen, pink, yellow, lavender, white

      Task 2: Change the text color.
      Try: black, blue, green, red, purple, darkblue
    */

    body {
      background-color: lightblue;
      color: darkblue;
    }

    /* STUDENT EDIT AREA END */

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Arial, Helvetica, sans-serif;
      text-align: center;
    }

    .card {
      padding: 40px;
      max-width: 900px;
    }

    h1 {
      font-size: 68px;
      margin: 0 0 24px 0;
    }

    p {
      font-size: 28px;
      margin: 12px 0;
    }

    .box {
      margin-top: 36px;
      padding: 20px;
      border: 3px solid currentColor;
      border-radius: 20px;
      font-size: 22px;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Hello everyone</h1>
    <p>This is my first web design.</p>
    <div class="box">
      Change the background color and the text color.
    </div>
  </main>
</body>
</html>
