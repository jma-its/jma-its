  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;

      font-family: Arial, Helvetica, sans-serif;

    .card {
      padding: 40px;
      max-width: 900px;
    }

      font-size: 72px;
      margin: 0 0 24px 0;
    }

    p {
      font-size: 28px;
      margin: 12px 0;

      font-size: 20px;
      color: #4b5563;
      margin-top: 36px;
    }

<body>
  <main class="card">

    <!-- STUDENT EDIT AREA START -->
    <!-- Task 1: Change everyone to your name. Example: Hello Ram -->

    <!-- Task 2: Change this sentence. -->
    <p>Welcome to my first web page.</p>
    <!-- STUDENT EDIT AREA END -->

    <p class="small">I changed the text. I am a web coder.</p>
